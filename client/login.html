<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | HR Pulse.io</title>
    <style>
        :root { --primary: #1a73e8; --accent: #764ba2; --bg: #f0f2f5; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #1a73e8, #764ba2);
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 380px; text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 { color: #1a1b1f; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
        p { color: #5f6368; margin-bottom: 30px; font-size: 0.95rem; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #444; }
        input { 
            width: 100%; padding: 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; 
            font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26,115,232,0.1); }
        .btn-auth { 
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s;
            margin-top: 10px;
        }
        .btn-auth:hover { background: #1557b0; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26,115,232,0.4); }
        .toggle-area { margin-top: 25px; font-size: 0.9rem; color: #5f6368; }
        .toggle-area span { color: var(--primary); cursor: pointer; font-weight: 700; }
        #loading { display: none; margin-top: 20px; color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>HR Pulse.io</h1>
        <p id="tagline">Cloud-based Performance Management</p>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@company.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-auth" id="mainBtn" onclick="handleAuth()">Sign In</button>
        <div id="loading">Establishing Secure Connection...</div>
        <div class="toggle-area">
            <span id="toggleLink" onclick="toggleMode()">Create New Account</span>
        </div>
    </div>

    <script>
        let isLogin = true;
        const API_URL = 'https://employee-tracker-api.onrender.com';

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('tagline').innerText = isLogin ? "Cloud-based Performance Management" : "Register Business Console";
            document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('toggleLink').innerText = isLogin ? "Already have an account? Sign In" : "Create New Account";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('mainBtn');
            const load = document.getElementById('loading');

            if(!email || !password) return alert("All fields are required.");
            btn.style.display = 'none';
            load.style.display = 'block';

            try {
                const res = await fetch(`${API_URL}/${isLogin ? 'login' : 'signup'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user_session', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || "Access Denied");
                    btn.style.display = 'block';
                    load.style.display = 'none';
                }
            } catch (err) {
                alert("Server waking up. Please try again in 30 seconds.");
                btn.style.display = 'block'; load.style.display = 'none';
            }
        }
    </script>
</body>
</html>
