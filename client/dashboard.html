<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | HR Pulse</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-logout { background: #ea4335; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="nav">
        <b style="color:#1a73e8">HR Pulse.io - Management Console</b>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
    
    <h1>Welcome to your Dashboard</h1>
    <div id="data">Loading employees...</div>

    <script>
        if (!localStorage.getItem('user_session')) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('user_session');
            window.location.href = 'index.html';
        }

        async function load() {
            try {
                const res = await fetch('https://employee-tracker-api.onrender.com/employees');
                const employees = await res.json();
                document.getElementById('data').innerHTML = employees.map(e => `<p>${e.name} - ${e.role}</p>`).join('');
            } catch (e) {
                document.getElementById('data').innerHTML = "Error loading data.";
            }
        }
        load();
    </script>
</body>
</html>
