<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | HR Pulse.io</title>
    <style>
        :root { --primary: #1a73e8; --accent: #764ba2; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center;
        }
        h1 { color: #202124; margin-bottom: 5px; font-size: 1.8rem; }
        p { color: #5f6368; margin-bottom: 30px; font-size: 0.9rem; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: #3c4043; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; 
            font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        .btn-auth { 
            width: 100%; padding: 14px; background: var(--primary); color: white; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .btn-auth:hover { background: #1557b0; transform: translateY(-1px); }
        .toggle-area { margin-top: 25px; font-size: 0.9rem; color: #5f6368; }
        .toggle-area span { color: var(--primary); cursor: pointer; font-weight: bold; }
        #loading { display: none; margin-top: 15px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>HR Pulse.io</h1>
        <p id="tagline">Cloud-based Performance Management</p>
        
        <div class="form-group">
            <label>Business Email</label>
            <input type="email" id="email" placeholder="name@company.com">
        </div>
        <div class="form-group">
            <label>Security Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-auth" id="mainBtn" onclick="handleAuth()">Sign In</button>
        <div id="loading">Verifying Security Credentials...</div>

        <div class="toggle-area">
            <span id="toggleLink" onclick="toggleMode()">Create a professional account</span>
        </div>
    </div>

    <script>
        let isLogin = true;
        const API_URL = 'https://employee-tracker-api.onrender.com';

        // If user is ALREADY logged in, send them straight to the dashboard
        if (localStorage.getItem('user_session')) {
            window.location.href = 'dashboard.html';
        }

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('tagline').innerText = isLogin ? "Cloud-based Performance Management" : "Register Business Console";
            document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Register Now";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('mainBtn');
            const load = document.getElementById('loading');

            if(!email || !password) return alert("Email and Password are required.");

            btn.style.display = 'none';
            load.style.display = 'block';

            try {
                const res = await fetch(`${API_URL}/${isLogin ? 'login' : 'signup'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('user_session', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html'; // REDIRECT TO DASHBOARD
                } else {
                    alert(data.error || "Authentication Failed");
                    btn.style.display = 'block';
                    load.style.display = 'none';
                }
            } catch (err) {
                alert("Server waking up. Please wait 30 seconds.");
                btn.style.display = 'block';
                load.style.display = 'none';
            }
        }
    </script>
</body>
</html>
