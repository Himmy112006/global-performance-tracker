<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HR Pulse</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a73e8; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>HR Pulse.io</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="btn" onclick="handleAuth()">Sign In / Register</button>
        <p id="msg" style="display:none; color: orange;">Connecting to server...</p>
    </div>

    <script>
        // If already logged in, go to dashboard
        if (localStorage.getItem('user_session')) {
            window.location.href = 'dashboard.html';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.style.display = 'block';

            try {
                // We try Login first, if it fails, we try Signup
                let res = await fetch('https://employee-tracker-api.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                let data = await res.json();

                if (!res.ok) {
                    // Try Signup if Login failed
                    res = await fetch('https://employee-tracker-api.onrender.com/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    data = await res.json();
                }

                if (res.ok) {
                    localStorage.setItem('user_session', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "Auth Failed");
                    msg.style.display = 'none';
                }
            } catch (err) {
                alert("Server is waking up. Try again in 20 seconds.");
                msg.style.display = 'none';
            }
        }
    </script>
</body>
</html>
