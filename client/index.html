<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | HR Pulse.io</title>
    <style>
        :root { --primary: #1a73e8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a73e8 0%, #764ba2 100%); }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .toggle { margin-top: 20px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; }
        #status { margin-top: 15px; font-weight: bold; color: #1a73e8; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>HR Pulse.io</h1>
        <p>Admin Console</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password (min 6 chars)">
        <button id="mainBtn" onclick="handleAuth()">Sign In</button>
        <div id="status">Processing...</div>
        <div class="toggle" onclick="toggleMode()" id="toggleBtn">Need an account? Register</div>
    </div>

    <script>
        let isLogin = true;
        const API_URL = 'https://employee-tracker-api.onrender.com';

        if (localStorage.getItem('user_session')) { window.location.href = 'dashboard.html'; }

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Register Now";
            document.getElementById('toggleBtn').innerText = isLogin ? "Already have an account? Sign In" : "Need an account? Register";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('mainBtn');
            const statusDiv = document.getElementById('status');

            if(!email || !password) return alert("Please enter both email and password.");
            
            btn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.innerText = "Connecting to Secure Server...";

            const endpoint = isLogin ? '/login' : '/signup';
            
            try {
                // Set a 30-second timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);

                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('user_session', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Auth Error: " + (data.error || "Unknown Error"));
                    resetUI();
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    alert("Server took too long to respond. Please try again in 10 seconds.");
                } else {
                    alert("Connection Failed. Make sure your Render server is awake.");
                }
                resetUI();
            }
        }

        function resetUI() {
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('status').style.display = 'none';
        }
    </script>
</body>
</html>
